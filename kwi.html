<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Leisure Activities</title>
</head>
<body>

    <h2>Student Leisure Activities</h2>

    <form>
        <p>Please check the leisure activities you enjoy:</p>

        <input type="checkbox" id="sports" name="leisure" value="Sports">
        <label for="sports">Playing Sports</label><br>

        <input type="checkbox" id="music" name="leisure" value="Music">
        <label for="music">Listening to Music</label><br>

        <input type="checkbox" id="reading" name="leisure" value="Reading">
        <label for="reading">Reading Books</label><br>

        <input type="checkbox" id="gaming" name="leisure" value="Gaming">
        <label for="gaming">Playing Video Games</label><br>

        <input type="checkbox" id="watching" name="leisure" value="Watching TV">
        <label for="watching">Watching TV/

        <input type="submit" value="Submit">
    </form>

</body>
</html>
